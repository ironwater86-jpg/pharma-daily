    var df=Math.round((t-dd)/86400000);
    var lb=df===0?"오늘":df===1?"어제":df+"일 전";
    h+="<div class='sh'>"+lb+" · "+g[d].length+"건</div>";
    h+=g[d].map(mkCard).join("");
  });
  el.innerHTML=h;
}

bldTabs();render();
</script>
