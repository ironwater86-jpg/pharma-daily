var D=[{"title": "면역항암제 시대 '신세포암'…2차 급여 공백은 여전", "summary": "\"현재 국내 진행성 신세포암 환자 상당수는 1차 치료로 옵디보(성분명 니볼루맙)와 여보이(성분명 이필리무맙) 병용요법을 사용한다. 문제는 이후 병이 진행됐을 때다. 글로벌 가이드라인에서는 면역항암제 이후 사용할 수 있는 치료 옵션을 제시하고 있지만, 국내 급여 기준에서는 실제 선택지가 제한된다. 치료 패러다임이 바뀌었다면 2차 치료 접근성도 이에 맞게 바뀌어야 한다.\"가톨릭대 서울성모병원 종양내과 김인호 교수는 지난 26일 입센코리아가 '202...", "url": "http://www.docdocdoc.co.kr/news/articleView.html?idxno=3039496", "source": "청년의사", "date": "2026-05-27", "time": "15:56", "cat": "general", "imp": "high", "lang": "ko"}, {"title": "외국인환자 초진 포함 비대면진료 허용", "summary": "외국인환자를 대상으로 한 비대면진료가 법적으로 허용되면서 정부가 K-의료 글로벌화에 속도를 낸다. 외국인환자 유치 확대와 의료기관 해외진출 증가에 맞춰 관리체계와 지원 기반도 함께 강화될 전망이다.보건복지부는 지난 26일 외국인환자 대상 비대면진료 제도화 등을 담은 ‘의료 해외진출 및 외국인환자 유치 지원에 관한 법’ 개정안이 국무회의를 거쳐 공포됐다고 밝혔다. 개정안은 공포 후 1년이 경과한 시점부터 시행된다.이번 개정안은 이재명 정부 국정과...", "url": "http://www.docdocdoc.co.kr/news/articleView.html?idxno=3039494", "source": "청년의사", "date": "2026-05-27", "time": "15:55", "cat": "policy", "imp": "medium", "lang": "ko"}, {"title": "보존치료 머물던 IgA 신병증…\"표적치료로의 전환점 맞아\"", "summary": "IgA 신병증 치료 환경이 전환점을 맞고 있다. 그동안 IgA 신병증 치료는 RAS 억제제 등 지지요법과 전신 스테로이드 중심으로 이뤄졌지만, 질환의 병태생리에 개입하는 표적치료제가 등장하면서 치료 전략 변화가 예고되고 있다.에베레스트메디신은 지난 26일 미디어 세션을 열고 국내 최초 IgA 신병증 표적치료제 '네페콘(성분명 미분화부데소니드)'의 임상적 가치를 조명했다.IgA 신병증은 신장 자체에 발생하는 1차성 신장질환으로, 국내 사구체신염의...", "url": "http://www.docdocdoc.co.kr/news/articleView.html?idxno=3039499", "source": "청년의사", "date": "2026-05-27", "time": "15:54", "cat": "general", "imp": "medium", "lang": "ko"}, {"title": "[신간] 4독 빼기", "summary": "현대인들이 생활습관병으로부터 벗어나고, 만성염증을 개선하는 데 도움을 줄 수 있는 신간이 나왔다. 바로 〈4독 빼기〉이다.책은 현대인의 식단에 숨어 있는 4가지 독소와 그 독소들이 우리 몸을 망가뜨리는 메커니즘을 밝힌다. 이어 4독을 제거한 식사가 가져오는 건강 개선 효과를 상세히 설명한다. 책에서 말하는 4가지 독소는 ▲면역을 망가뜨리는 밀 ▲암을 부르는 유제품 ▲혈관과 신경을 망가뜨리는 식물성 기름 ▲뇌를 망가뜨리고 의존성을 키우는 설탕 등...", "url": "http://www.docdocdoc.co.kr/news/articleView.html?idxno=3039440", "source": "청년의사", "date": "2026-05-27", "time": "15:40", "cat": "general", "imp": "medium", "lang": "ko"}, {"title": "“강의 듣고 무료 검사까지”…강원대병원, 전립선암 무료 검진", "summar     var lb=df===0?"오늘":df===1?"어제":df+"일 전";
    h+="<button class='tb' onclick='sD(""+d+"",this)'>"+lb+" <span style='font-size:10px;opacity:.6'>"+n+"</span></button>";
  });
  document.getElementById("tabs").innerHTML=h;
}

function sD(d,b){curD=d;document.querySelectorAll(".tb").forEach(function(x){x.classList.remove("on");});b.classList.add("on");render();}
function fC(c,b){curC=c;document.querySelectorAll(".ct").forEach(function(x){x.classList.remove("on");});b.classList.add("on");render();}

function render(){
  var list=D.filter(function(a){return(curD==="all"||a.date===curD)&&(curC==="all"||a.cat===curC);});
  document.getElementById("s1").textContent=D.length;
  document.getElementById("s2").textContent=D.filter(function(a){return a.imp==="high";}).length;
  document.getElementById("s3").textContent=[...new Set(D.map(function(a){return a.cat;}))].length;
  document.getElementById("stx").textContent=D.length+"건 · 매일 오전 6시 자동 업데이트";
  var el=document.getElementById("al");
  if(!list.length){
    el.innerHTML="<div class='emp'><div class='eti'>해당 기사 없음</div><div class='ede'>날짜나 카테고리를 바꿔보세요.</div></div>";
    return;
  }
  var g={};
  list.forEach(function(a){if(!g[a.date])g[a.date]=[];g[a.date].push(a);});
  var h="";
  Object.keys(g).sort().reverse().forEach(function(d){
    var dd=new Date(d+"T00:00:00+09:00"),t=new Date();t.setHours(0,0,0,0);
    var df=Math.round((t-dd)/86400000);
    var lb=df===0?"오늘":df===1?"어제":df+"일 전";
    h+="<div class='sh'>"+lb+" · "+g[d].length+"건</div>";
    h+=g[d].map(mkCard).join("");
  });
  el.innerHTML=h;
}

bldTabs();render();
</script>
</body>
</html>
