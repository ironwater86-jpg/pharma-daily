*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}

.tbr{background:var(--bg2);border-bottom:.5px solid var(--border);overflow-x:auto;scrollbar-width:none;-ms-overflow-style:none}

.arr{display:inline-block;transition:transform .2s;font-size:12px;color:var(--text3)}

.emp{text-align:center;padding:50px 20px}
.eti{font-family:var(--fs);font-size:20px;margin-bottom:7px;color:var(--text)}
.ede{font-size:13px;color:var(--text3);line-height:1.8}
@media(min-width:480px){.hdr,.tbr{padding-left:24px;padding-right:24px}.tbs,.cts{padding-left:24px;padding-right:24px}.aw,.sts{padding-left:24px;padding-right:24px}}

var D=[{"title": "[칼럼] 병원은 왜 서로를 태우는가", "summary": "최근에도 간호현장의 ‘태움’ 문제가 반복적으로 보도되고 있다. 간호사들은 공통적으로 “개인의 인성 문제가 아니라 인력 부족 문제”라고 말한다. 이 말은 단순히 업무량이 많다는 차원의 이야기가 아니다. 그 안에는 의료현장 전체가 이미 감당 한계를 넘어선 긴장 구조 속에서 운영되고 있다는 의미가 담겨 있다.태움 문제를 단순히 “선배 간호사의 괴롭힘” 정도로 이해하면 해결은 반복적으로 실패할 수밖에 없다. 실제 의료현장에서 발생하는 충돌은 개인 성격...", "url": "http://www.docdocdoc.co.kr/news/articleView.html?idxno=3039189", "source": "청년의사", "date": "2026-05-14", "time": "15:56", "cat": "general", "imp": "medium", "lang": "ko"}, {"title": "6·3 지방선거 달군 의료인 출신 후보들…시장·구청장 도전 잇따라", "summary": "6·3 지방선거를 앞두고 의료인 출신 후보들이 기초단체장 선거에 잇따라 도전장을 내밀고 있다. 의사와 약사, 간호사 출신 후보들이 시장과 구청장 선거에 출마하며 의료 현장 경험을 앞세운 지역 행정 경쟁에 나서는 모습이다.중앙선거관리위원회에 따르면 13일 기준 기초단체장 선거 예비후보 등록을 마친 의료인 출신 후보는 9명이다. 의사는 4명, 치과의사 1명, 간호사 2명, 약사 2명 등이다.기초단체장 가운데 시장 선거에는 의사와 간호사 출신 후보들...", "url": "http://www.docdocdoc.co.kr/news/articleView.html?idxno=3039183", "source": "청년의사", "date": "2026-05-14", "time": "15:47", "cat": "general", "imp": "medium", "lang": "ko"}, {"title": "GC녹십자의료재단 손 들어준 법원, ‘병리 인증취소’ 효력 정지", "summary": "검체검사 오인·변경 사건으로 ‘병리분야 검체검사 수탁 1개월 인증 취소’ 행정처분을 받은 GC녹십자의료재단이 처분 취소 및 집행정지 소송을 제기, 법원이 집행정지를 인용했다. 보건복지부는 법적 대응과 함께 수탁기관 인증 및 제재기준을 명확히 하겠다는 입장이다.보건복지부 관계자는 지난 12일 전문기자협의회에 GC녹십자의료재단 행정처분 상황에 대해 설명하며 이같이 밝혔다.앞서 복지부는 지난해 7월 31일 ‘제2기 검체검사수탁인증관리위원회’를 열어 ...", "url": "http://www.docdocdoc.co.kr/news/articleView.html?idxno=3039187", "source": "청년의사", "date": "2026-05-14", "time": "15:42", "cat": "policy", "imp": "medium", "lang": "ko"}, {"title": "응급의학과 전문의 2명 과실치상 유죄…5년 전 민사도 \"의료진 과실\"", "summary": "응급의학과 전문의 2명에게 업무상과실치상죄를 물은 법원 판결로 의료계가 또다시 충격에 휩싸였다. 8년 전, 응급실을 찾아온 20대 뇌경색 환자 진단을 놓쳤다는 이유다. 금고형 집행유예가 선고된 전문의들은 당시 대학병원 레지던트 4년차와 1년차 전공의였다.앞서 열린 민사 손해 배상 소송에서도 법원은 이들의 과실을 인정해, 대학병원이 환자에게 약 3억원을 배상하도록 했다. 청년의사는 해당 민사 판결문을 통해 법원이 민사 소송에서는 이번 사건을 어떻...", "url": "http://www.docdocdoc.co.kr/news/articleView.html?idxno=3039156", "source": "청년의사", "date": "2026-05-14", "time": "15:36", "cat": "general", "imp": "medium", "lang": "ko"}, {"title": "특허 장벽     var dd=new Date(d+"T00:00:00+09:00"),t=new Date();t.setHours(0,0,0,0);
    var df=Math.round((t-dd)/86400000);
    var lb=df===0?"오늘":df===1?"어제":df+"일 전";
    h+="<button class='tb' onclick='sD(""+d+"",this)'>"+lb+" <span style='font-size:10px;opacity:.6'>"+n+"</span></button>";
  });
  document.getElementById("tabs").innerHTML=h;
}

function sD(d,b){curD=d;document.querySelectorAll(".tb").forEach(function(x){x.classList.remove("on");});b.classList.add("on");render();}
function fC(c,b){curC=c;document.querySelectorAll(".ct").forEach(function(x){x.classList.remove("on");});b.classList.add("on");render();}

function render(){
  var list=D.filter(function(a){return(curD==="all"||a.date===curD)&&(curC==="all"||a.cat===curC);});
  document.getElementById("s1").textContent=D.length;
  document.getElementById("s2").textContent=D.filter(function(a){return a.imp==="high";}).length;
  document.getElementById("s3").textContent=[...new Set(D.map(function(a){return a.cat;}))].length;
  document.getElementById("stx").textContent=D.length+"건 · 매일 오전 6시 자동 업데이트";
  var el=document.getElementById("al");
  if(!list.length){
    el.innerHTML="<div class='emp'><div class='eti'>해당 기사 없음</div><div class='ede'>날짜나 카테고리를 바꿔보세요.</div></div>";
    return;
  }
  var g={};
  list.forEach(function(a){if(!g[a.date])g[a.date]=[];g[a.date].push(a);});
  var h="";
  Object.keys(g).sort().reverse().forEach(function(d){
    var dd=new Date(d+"T00:00:00+09:00"),t=new Date();t.setHours(0,0,0,0);
    var df=Math.round((t-dd)/86400000);
    var lb=df===0?"오늘":df===1?"어제":df+"일 전";
    h+="<div class='sh'>"+lb+" · "+g[d].length+"건</div>";
    h+=g[d].map(mkCard).join("");
  });
  el.innerHTML=h;
}

bldTabs();render();
</script>
</body>
</html>
